<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <!-- Inner glowing ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#logoGrad)" stroke-width="4" opacity="0.3" />
  <!-- Logo Symbol (Upward growth arrow + R shape) -->
  <g filter="url(#glow)">
    <path d="M180,360 L180,160 C180,140 196,120 220,120 L300,120 C340,120 360,140 360,180 C360,220 340,240 300,240 L240,240 L340,360 M240,240 L300,240" 
          fill="none" stroke="url(#logoGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="300" cy="180" r="16" fill="#10b981" />
  </g>
</svg>
